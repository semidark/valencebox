<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ValenceBox</title>
    <link rel="stylesheet" href="./vendor/xterm.css" />
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      body { margin: 0; font: 13px ui-monospace, Menlo, monospace; background: #0b0d10; color: #cdd3da; display: flex; flex-direction: column; height: 100vh; }
      header { display: flex; gap: 16px; align-items: center; padding: 8px 12px; background: #12151a; border-bottom: 1px solid #222; }
      .badge { padding: 2px 8px; border-radius: 4px; background: #1d2530; }
      .badge.ready { background: #143d1e; color: #7fe08f; }
      .badge.error { background: #3d1414; color: #ff9a9a; }
      .stat { color: #7d8794; }
      .stat b { color: #cdd3da; font-weight: 600; }
      #term-wrap { flex: 1; min-height: 0; position: relative; }
      #term { padding: 6px 8px; height: 100%; }
      #term .xterm { height: 100%; }
      #overlay { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: rgba(11, 13, 16, 0.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); opacity: 1; transition: opacity 0.3s ease, backdrop-filter 0.3s ease; pointer-events: none; }
      #overlay.hidden { opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }
      #overlay .spinner { width: 36px; height: 36px; border: 3px solid #2a2f38; border-top-color: #7fe08f; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #overlay-text { color: #7d8794; font-size: 13px; }
      #debug-btn { pointer-events: auto; font-size: 11px; padding: 4px 10px; opacity: 0.6; }
      #debug-btn:hover { opacity: 1; }
      button { background: #1d2530; color: #cdd3da; border: 1px solid #2a2f38; padding: 6px 12px; border-radius: 4px; cursor: pointer; font: inherit; }
      button:hover { background: #263040; }
      #conflicts { color: #e0c07f; padding: 0 12px; max-height: 80px; overflow-y: auto; }
    </style>
  </head>
  <body>
    <header>
      <span id="phase" class="badge">starting…</span>
      <span class="stat">boot <b id="boot">–</b></span>
      <span class="stat">↑<b id="pushed">0</b> ↓<b id="pulled">0</b> ✕<b id="deleted">0</b></span>
      <span class="stat">conflicts <b id="conflicts-n">0</b></span>
      <span class="stat">sync <b id="sync-speed">–</b></span>
      <span class="stat">net <b id="net">–</b></span>
      <span style="flex:1"></span>
      <button id="snap">Snapshot</button>
    </header>
    <div id="conflicts"></div>
    <div id="term-wrap">
      <div id="term"></div>
      <div id="overlay" class="hidden">
        <div class="spinner"></div>
        <div id="overlay-text">Booting…</div>
        <button id="debug-btn">Debug</button>
      </div>
    </div>
    <script src="./vendor/xterm.js"></script>
    <script src="./vendor/addon-fit.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
